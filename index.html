<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Dịch Việt-Anh</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="header">
        <h1>Công cụ Dịch Việt-Anh</h1>
    </div>
    
    <div class="controls">
        <select id="sourceLanguage" class="language-select">
            <option value="vi">Tiếng Việt</option>
            <option value="en">Tiếng Anh</option>
        </select>

        <div class="control-buttons">
            <button id="micButton" class="mic-button" onclick="speechRecognition.toggleRecording()">
                <i class="fas fa-microphone"></i>
                <span>Bắt đầu ghi âm</span>
            </button>
            <button class="translate-button" onclick="translator.translate()">
                <i class="fas fa-language"></i>
                <span>Dịch</span>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="translate-column">
            <div class="column-header">
                <i class="fas fa-pen"></i>
                <h3>Văn bản gốc</h3>
            </div>
            <textarea id="vietnameseText" placeholder="Nhập hoặc nói văn bản cần dịch tại đây..."></textarea>
        </div>
        <div class="translate-column">
            <div class="column-header">
                <i class="fas fa-globe"></i>
                <h3>Bản dịch</h3>
            </div>
            <textarea id="englishText" readonly placeholder="Bản dịch sẽ xuất hiện tại đây..."></textarea>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/translator.js"></script>
    <script src="/js/speechRecognition.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
